app = "gestiune-stoc"
primary_region = "ams"

[build]

[deploy]
  release_command = "node node_modules/prisma/build/index.js migrate deploy"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  DATABASE_URL = "file:/data/stock.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
